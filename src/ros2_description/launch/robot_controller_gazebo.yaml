controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint0
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    gains:
      joint0: {p: 200.0, i: 0.1, d: 2.0}
      joint1: {p: 200.0, i: 0.1, d: 2.0}
      joint1: {p: 200.0, i: 0.1, d: 2.0}
      joint3: {p: 200.0, i: 0.1, d: 2.0}
      joint4: {p: 200.0, i: 0.1, d: 2.0}
      joint5: {p: 200.0, i: 0.1, d: 2.0}
      joint6: {p: 200.0, i: 0.1, d: 2.0} 
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
